{% extends "base.html" %}

{% block content %}
<div class="container">
    <h2>⚠️ 정말로 삭제하시겠습니까?</h2>
    <p><strong>{{ tree.title }}</strong> (생성일: {{ tree.created_at|date:"Y-m-d" }})</p>

    <form method="post">
        {% csrf_token %}
        <button type="submit">삭제하기</button>
        <a href="{% url 'home' %}">취소</a>
    </form>
</div>
{% endblock %}
