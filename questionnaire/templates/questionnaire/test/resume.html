<h2>{{ tree.name }} - 이어하기</h2>
<form method="post">
  {% csrf_token %}
  {% for answer in answers %}
    <div>
      <label>{{ answer.question.text }}</label><br>
      <textarea name="answer_{{ answer.id }}">{{ answer.text }}</textarea>
    </div>
  {% endfor %}
  <button type="submit">저장하고 계속하기</button>
</form>
