<h2>🎉 모든 질문이 완료되었습니다!</h2>
<p>아래는 당신이 남긴 답변입니다:</p>

<div>
  <div style="max-width: 600px; margin: 0 auto;">
  {% for a in answers %}
      <div style="margin-bottom: 1.5rem; padding: 1rem; border: 1px solid #ccc; border-radius: 6px;">
        <strong>Q{{ a.question.order }}. {{ a.question.question_text }}</strong><br>
        <em>당신의 답변:</em><br>
        <p>{{ a.answer_text }}</p>
        <a href="{% url 'questionnaire:edit_answer' a.id %}">✏️ 수정하기</a>
        
      </div>
  {% endfor %}
</div>
