# v2: 측정·검증 강조 (동일 API, 다른 지시문·생성 파라미터)
version: v2
description: "측정 가능한 목표와 검증 단계를 강조한 전략·프롬프트"
model: "gemini-2.5-flash-lite"
api: chat
generation:
  max_tokens: 600
  temperature: 0.55
  top_p: 0.9
tasks:
  strategy:
    user: strategy_user.jinja
  prompt_builder:
    user: prompt_builder_user.jinja
    system: prompt_builder_system.jinja
    generation:
      temperature: 0.4
      max_tokens: 2048
