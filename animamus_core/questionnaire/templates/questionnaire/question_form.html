<!DOCTYPE html>
<html>
<head>
    <title>{{ category.name }} - 질문 {{ step }}/{{ total }}</title>
</head>
<body>
    <h2>{{ category.name }} - 질문 {{ step }} / {{ total }}</h2>
    <p><strong>{{ question.text }}</strong></p>

    {% if question.guidance %}
        <p><strong>예시:</strong> {{ question.guidance }}</p>
    {% endif %}
    {% if question.hint %}
        <p><em>설명:</em> {{ question.hint }}</em></p>
    {% endif %}

    <form method="post">
        {% csrf_token %}
        <textarea name="answer" rows="5" placeholder="답변을 입력하세요" required style="width:100%;"></textarea>
        <br><br>
        <button type="submit">다음</button>
    </form>
</body>
</html>
