<!DOCTYPE html>
<html>
<head>
    <title>응답 요약</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        table { border-collapse: collapse; width: 100%; margin-top: 20px; }
        th, td { border: 1px solid #ccc; padding: 10px; text-align: left; }
        th { background-color: #f2f2f2; }
        h2 { margin-bottom: 10px; }
    </style>
</head>
<body>
    <h2>설문 응답 요약</h2>

    {% if responses %}
        <table>
            <thead>
                <tr>
                    <th>질문 ID</th>
                    <th>답변</th>
                </tr>
            </thead>
            <tbody>
                {% for r in responses %}
                    <tr>
                        <td>{{ r.question_id }}</td>
                        <td>{{ r.answer }}</td>
                    </tr>
                {% endfor %}
            </tbody>
        </table>
    {% else %}
        <p>아직 응답이 없습니다.</p>
    {% endif %}

    <p><a href="{% url 'questionnaire:start' %}">처음으로 돌아가기</a></p>
</body>
</html>
