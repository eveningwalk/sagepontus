{% extends 'base.html' %}
{% load static %}

{% block extra_css %}
<link rel="stylesheet" href="{% static 'css/auth.css' %}">
{% endblock %}

{% block body %}
<div class="auth-wrap">
  <div class="auth-card">
    <a href="/" class="auth-logo">
      <div class="auth-logo__mark">SP</div>
      <span class="auth-logo__name">Sage Pontus</span>
    </a>

    <h1 class="auth-title">로그인</h1>
    <p class="auth-sub">이메일과 비밀번호를 입력해주세요.</p>

    <form method="post" novalidate>
      {% csrf_token %}

      <div class="auth-field {% if error %}auth-field--error{% endif %}">
        <label for="email">이메일</label>
        <input type="email" name="email" id="email"
               placeholder="your@email.com"
               autocomplete="email" autofocus required>
      </div>

      <div class="auth-field {% if error %}auth-field--error{% endif %}">
        <label for="password">비밀번호</label>
        <input type="password" name="password" id="password"
               autocomplete="current-password" required>
        {% if error %}
          <p class="auth-field__error">이메일 또는 비밀번호가 올바르지 않습니다.</p>
        {% endif %}
      </div>

      <button type="submit" class="auth-btn">로그인하기</button>
    </form>

    <p class="auth-footer">
      <a href="{% url 'demo' %}">데모 시연 (로그인 없이 체험)</a>
    </p>
  </div>
</div>
{% endblock %}
