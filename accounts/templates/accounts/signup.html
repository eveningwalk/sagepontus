{% extends 'base.html' %}
{% load i18n %} 

{% block content %}
  <div style="max-width: 400px; margin: 0 auto; padding: 2rem;">
    <h2>{% trans "회원가입" %}</h2>
    <form method="post">
      {% csrf_token %}
      <label for="id_username">{% trans "아이디" %}</label>
      {{ form.username }}<br>

      <label for="id_password1">{% trans "비밀번호" %}</label>
      {{ form.password1 }}<br>

      <label for="id_password2">{% trans "비밀번호 확인" %}</label>
      {{ form.password2 }}<br>

      <button type="submit" style="margin-top: 1rem;">{% trans "가입하기" %}</button>
    </form>

    <p style="margin-top: 1rem;">
      {% trans "이미 계정이 있으신가요?" %}
      <a href="{% url 'accounts:login' %}">{% trans "로그인하기" %}</a>
    </p>
  </div>
{% endblock %}
