{% extends 'base.html' %}

{% block content %}
  {% if user.is_authenticated %}
    <h2>환영합니다, {{ user.username }}님!</h2>
    <p>인터뷰를 시작하려면 아래 버튼을 눌러주세요.</p>
    <form method="get" action="{% url 'questionnaire:question_step' category='common' order=1 %}">
      <button class="btn">공통 질문 시작하기</button>
    </form>
  {% else %}
    <h2>Animamus에 오신 것을 환영합니다</h2>
    <p style="margin-bottom:1rem;">
      <a href="{% url 'demo' %}" class="btn" style="display:inline-block;margin-bottom:0.5rem;">데모 시연 (로그인 없이 · QR용)</a>
    </p>
    <form method="post" action="{% url 'accounts:login' %}">
      {% csrf_token %}
      <label for="username">아이디</label><br>
      <input type="text" name="username" required><br><br>
      <label for="password">비밀번호</label><br>
      <input type="password" name="password" required><br><br>
      <button type="submit" class="btn">로그인</button>
    </form>
    <p style="margin-top: 1rem;">
      아직 계정이 없으신가요?
      <a href="{% url 'accounts:signup' %}" class="btn">회원가입하기</a>
    </p>
  {% endif %}
{% endblock %}
