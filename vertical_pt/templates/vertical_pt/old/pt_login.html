{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sign In — Sage Pontus PT</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    .card {
      background: #fff; border-radius: 16px; padding: 40px 44px;
      width: 100%; max-width: 400px; box-shadow: 0 20px 60px rgba(0,0,0,.4);
    }
    .brand { display: flex; align-items: center; gap: 10px; margin-bottom: 28px; }
    .brand-icon {
      width: 36px; height: 36px; border-radius: 8px;
      background: linear-gradient(135deg,#dc2626,#b91c1c);
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
    }
    .brand-name { font-size: 18px; font-weight: 700; color: #1e293b; }
    .brand-sub  { font-size: 12px; color: #64748b; }
    h2 { font-size: 22px; font-weight: 700; color: #1e293b; margin-bottom: 6px; }
    .subtitle { font-size: 13px; color: #64748b; margin-bottom: 28px; }

    .field { margin-bottom: 18px; }
    label { display: block; font-size: 12px; font-weight: 600; color: #374151;
            text-transform: uppercase; letter-spacing: .4px; margin-bottom: 5px; }
    input {
      width: 100%; padding: 11px 13px; border: 1px solid #d1d5db; border-radius: 8px;
      font-size: 14px; outline: none; transition: border-color .15s;
    }
    input:focus { border-color: #6366f1; box-shadow: 0 0 0 3px rgba(99,102,241,.12); }

    .error-banner {
      background: #fef2f2; border: 1px solid #fca5a5; border-radius: 8px;
      padding: 10px 13px; font-size: 13px; color: #dc2626; margin-bottom: 18px;
    }
    .submit-btn {
      width: 100%; padding: 12px; border: none; border-radius: 9px;
      background: linear-gradient(135deg,#dc2626,#b91c1c);
      color: #fff; font-size: 15px; font-weight: 700; cursor: pointer;
      transition: opacity .15s;
    }
    .submit-btn:hover { opacity: .9; }
    .signup-link { text-align: center; margin-top: 20px; font-size: 13px; color: #64748b; }
    .signup-link a { color: #6366f1; font-weight: 600; text-decoration: none; }
  </style>
</head>
<body>
<div class="card">
  <div class="brand">
    <div class="brand-icon">🚨</div>
    <div>
      <div class="brand-name">Sage Pontus PT</div>
      <div class="brand-sub">Red Flag Alarm System</div>
    </div>
  </div>

  <h2>Welcome back</h2>
  <p class="subtitle">Sign in to your PT account.</p>

  {% if error %}
    <div class="error-banner">{{ error }}</div>
  {% endif %}

  <form method="post">
    {% csrf_token %}
    <div class="field">
      <label>Email</label>
      <input type="email" name="email" autofocus required>
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" name="password" required>
    </div>
    <button type="submit" class="submit-btn">Sign In</button>
  </form>

  <p class="signup-link">Don't have an account? <a href="{% url 'vertical_pt:pt_signup' %}">Sign up free</a></p>
</div>
</body>
</html>
