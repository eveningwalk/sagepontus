{% load static %}
<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>{% block title %}Sage Pontus{% endblock %}</title>
  <link rel="stylesheet" href="{% static 'css/app_shell.css' %}">
  {% block extra_css %}{% endblock %}
</head>
<body>
  {% block body %}
  <div class="page-root">
    {% if messages %}
    <div class="flash-msgs" role="status">
      {% for message in messages %}
      <p class="flash-msgs__line">{{ message }}</p>
      {% endfor %}
    </div>
    {% endif %}
    {% block content %}
    {% endblock %}
  </div>
  {% endblock %}
  {% block extra_js %}{% endblock %}
</body>
</html>
