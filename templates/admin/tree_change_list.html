{% extends "admin/change_list.html" %}

{% block result_list %}
    <ul class="tree-list">
        {% for node in cl.result_list %}
            {% widthratio node.depth 1 20 as indent %}
            <li style="margin-left:{{ indent }}px;">
                🌿 {{ node.title }} ({{ node.type }})
            </li>
        {% endfor %}
    </ul>
{% endblock %}
